# Compatible with docker-compose v1 (hyphen) and Docker Compose v2 (plugin).
version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hatecrime
    # Postgres is not published to the host by default (safer). For local tools use:
    #   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
    volumes:
      - hatecrime_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hatecrime"]
      interval: 3s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      # 8787 avoids stale local uvicorn instances often bound on 8000/8001
      - "8787:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/hatecrime
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string-for-docker}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      ALLOW_DEFAULT_USER_SEED: ${ALLOW_DEFAULT_USER_SEED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=5)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_FORM_PATH_SLUG: ${VITE_FORM_PATH_SLUG:-Kp9mNx2vQw7Rt4yL8bHc1dF}
        VITE_ADMIN_PATH_SLUG: ${VITE_ADMIN_PATH_SLUG:-Hn3qWz8cRm6Tk5xP2vJk4mN}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hatecrime_pgdata:
